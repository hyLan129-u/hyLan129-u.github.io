<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真是NO吗?</title>
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
            /* 星空黑背景 */
            background: #050512;
            background-image: radial-gradient(#ffffff12 1px, transparent 1px);
            background-size: 30px 30px;
        }
        h1 {
            font-size: clamp(26px, 6vw, 48px);
            color: #80c0ff;
            text-align: center;
        }
        p {
            font-size: clamp(16px, 3vw, 24px);
            color: #eee;
            text-align: center;
        }
        /* 图片自适应 */
        .img-box {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4 / 3;
            border: 3px solid #fff;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 返回按钮适配手机 */
        .back-home {
            position: fixed;
            right: 20px;
            bottom: 20px;
            padding: 10px 20px;
            border: 3px solid #fff;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: bold;
        }
        .back-home:hover {
            background-color: #ffffff22;
        }
    </style>
</head>
<body>
    <h1>点no我也知道你今天生日，生日快乐！🎉</h1>
    <p>祝你天天开心，永远18岁</p>

    <!-- 更换图片修改src -->
    <div class="img-box">
        <img src="/haha.png" alt="配图">
    </div>

    <a href="index.html" class="back-home">返回主页</a>
</body>
</html>
