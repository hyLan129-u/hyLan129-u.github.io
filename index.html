<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #ff7eb3, #ff758f, #ffd3a5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 跳动主标题 */
        .main-title {
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 20px #ff2b5c;
            animation: beat 1s infinite alternate;
            margin-bottom: 25px;
            text-align: center;
            z-index: 10;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.07); }
        }
        /* 生日图片 */
        .photo {
            width: 340px;
            max-width: 90%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 40, 90, 0.35);
            margin-bottom: 28px;
            z-index: 10;
        }
        /* 祝福文案 */
        .words {
            font-size: 24px;
            color: white;
            text-shadow: 0 0 8px #c41e47;
            text-align: center;
            padding: 0 15px;
            line-height: 1.8;
            z-index: 10;
        }
        /* 爱心粒子 */
        .heart {
            position: fixed;
            color: #ff477e;
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-10%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* 烟花画布铺满全屏 */
        #firework {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 烟花画布 -->
    <canvas id="firework"></canvas>

    <h1 class="main-title">大美女，生日快乐！</h1>
    <!-- 替换这里的图片地址 -->
    <img class="photo" src="birthday.jpg" alt="生日照片">
    <p class="words">永远18岁✨，天天开心<br>事事顺心✨</p>

    <script>
        // 1. 飘落爱心效果
        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 300);

        // 2. 烟花特效
        const canvas = document.getElementById("firework");
        const ctx = canvas.getContext("2d");
        let width, height;
        let fireworks = [];
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        // 烟花类
        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * height * 0.35;
                this.speed = 3 + Math.random() * 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.exploded = false;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY && !this.exploded) {
                    this.explode();
                    this.exploded = true;
                }
            }
            explode() {
                for (let i = 0; i < 80; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // 火花粒子
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= 0.012;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 循环渲染
        function loop() {
            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.fillRect(0, 0, width, height);
            if (Math.random() < 0.04) fireworks.push(new Firework());
            fireworks.forEach(f => {
                f.update();
                f.draw();
            });
            fireworks = fireworks.filter(f => !f.exploded);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            particles = particles.filter(p => p.alpha > 0);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
