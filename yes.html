<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐窝!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
             /* 星空黑背景+星光点 */
            background: #050512;
            background-image: radial-gradient(#ffffff12 1px, transparent 1px);
            background-size: 30px 30px;
        }
        h1 {
            font-size: 48px;
            color: #e63946;
        }
        p {
            font-size: 24px;
            color: #333;
        }
        /* 图片区域 */
        .img-box {
            width: 400px;
            height: 300px;
            border: 3px solid #000;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右下角返回按钮 */
        .back-home {
            position: fixed;
            right: 40px;
            bottom: 40px;
            padding: 14px 28px;
            border: 3px solid #000;
            border-radius: 10px;
            text-decoration: none;
            color: #000;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>大美女,生日快乐！🎉</h1>
    <p>祝你天天开心，永远18岁，嘻嘻!</p>
    <p>点no试一试也行窝</p>

    <!-- 更换图片修改src -->
    <div class="img-box">
        <img src="/haha.png" alt="生日图">
    </div>

    <a href="index.html" class="back-home">返回主页</a>
</body>
</html>
